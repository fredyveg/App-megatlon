<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Megatlon/Fiter</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/5511/5511413.png">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5511/5511413.png">

</head>
<body>

    <header class="header">
        <div class="container">
            <div class="sum-box">
                <div class="sum-item"><p>Neto Base</p><h3 id="view-neto-base">$0,00</h3></div>
                <div style="color:#a5b4fc"><i class="fa-solid fa-plus"></i></div>
                <div class="sum-item"><p>Extras</p><h3 id="view-extra-neto">$0,00</h3></div>
            </div>
            <p style="font-size: 0.7rem; color: #a5b4fc; text-transform: uppercase;">Total Neto Estimado</p>
            <h1 class="total-h1" id="view-total-neto">$0,00</h1>
            
            <p class="bruto-p">Bruto: <span id="view-total-bruto">$0,00</span> | Extras: <strong id="view-total-horas">0h</strong></p>
        </div>
    </header>

    <main class="container">
        <div class="card" id="form-card">
            <div class="card-title" id="form-title">Registrar Turno</div>
            
            <div class="form-group">
                <label class="label">Fecha</label>
                <input type="date" id="in-fecha" class="input">
            </div>

            <label class="toggle-area">
                <input type="checkbox" id="in-acordar" style="display:none" onchange="toggleInputs()">
                <div class="sw"></div>
                <span style="font-size:0.8rem; font-weight:bold;">A acordar con coordinador</span>
            </label>

            <div class="grid" id="box-horas">
                <div class="form-group">
                    <label class="label">Inicio</label>
                    <input type="time" id="in-inicio" class="input">
                </div>
                <div class="form-group">
                    <label class="label">Fin</label>
                    <input type="time" id="in-fin" class="input">
                </div>
            </div>

            <div class="form-group">
                <label class="label">Tareas Realizadas (Opcional)</label>
                <input type="text" id="in-tareas" class="input"
            </div>

            <button onclick="handleSave()" class="btn btn-primary" id="btn-main">Guardar Registro</button>
            <button onclick="cancelEdit()" class="btn btn-cancel" id="btn-cancel" style="display:none">Cancelar Edición</button>
        </div>

        <div class="card">
            <div class="card-title">
                Historial del Ciclo 
                <button onclick="resetAll()" style="color:var(--danger); background:none; border:none; font-size:0.7rem; font-weight:bold; cursor:pointer;">BORRAR TODO</button>
            </div>
            <ul id="list-data" style="list-style:none"></ul>
        </div>
    </main>

    <script>
        // VALORES ACTUALIZADOS SEGÚN RECIBO MARZO 2026
        const VALORES = {
            BRUTO_BASE: 1680000,
            NETO_BASE: 1394400, // Neto aproximado después de descuentos (17%)
            HORA_BRUTA: 1680000 / 200,
            HORA_NETA: (1680000 / 200) * 0.83 
        };

        let db = JSON.parse(localStorage.getItem('rutas_v5')) || [];
        let editId = null;

        window.onload = () => {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('in-fecha').value = hoy;
            document.getElementById('view-neto-base').innerText = fmt(VALORES.NETO_BASE);
            render();
        };

        function toggleInputs() {
            const isChecked = document.getElementById('in-acordar').checked;
            document.getElementById('box-horas').style.display = isChecked ? 'none' : 'grid';
        }

        function calcHoras(f, hi, hf) {
            let start = new Date(`${f}T${hi}`);
            let end = new Date(`${f}T${hf}`);
            if (end < start) end.setDate(end.getDate() + 1);

            let h50 = 0, h100 = 0;
            let cur = new Date(start);
            while (cur < end) {
                let d = cur.getDay(), h = cur.getHours();
                // Sábado después de las 13 o Domingo todo el día = 100%
                if (d === 0 || (d === 6 && h >= 13)) h100 += 1/60;
                else h50 += 1/60;
                cur.setMinutes(cur.getMinutes() + 1);
            }
            return { h50, h100 };
        }

        function handleSave() {
            const f = document.getElementById('in-fecha').value;
            const acor = document.getElementById('in-acordar').checked;
            const tareas = document.getElementById('in-tareas').value.trim();
            
            if (!f) return alert("Falta fecha");

            let item = { fecha: f, acor: acor, tareas: tareas };

            if (!acor) {
                const hi = document.getElementById('in-inicio').value;
                const hf = document.getElementById('in-fin').value;
                if (!hi || !hf) return alert("Faltan horas");

                const res = calcHoras(f, hi, hf);
                item.h50 = res.h50;
                item.h100 = res.h100;
                item.neto = (res.h50 * VALORES.HORA_NETA * 1.5) + (res.h100 * VALORES.HORA_NETA * 2);
                item.bruto = (res.h50 * VALORES.HORA_BRUTA * 1.5) + (res.h100 * VALORES.HORA_BRUTA * 2);
                item.txt = `${hi} a ${hf}`;
            } else {
                item.h50 = 0; item.h100 = 0; item.neto = 0; item.bruto = 0; item.txt = "A acordar";
            }

            if (editId) {
                const index = db.findIndex(x => x.id === editId);
                db[index] = { ...item, id: editId };
                editId = null;
            } else {
                db.push({ ...item, id: Date.now() });
            }

            localStorage.setItem('rutas_v5', JSON.stringify(db));
            cancelEdit(); 
            render();
        }

        function render() {
            const list = document.getElementById('list-data');
            list.innerHTML = "";
            let tNeto = 0, tBruto = 0, tHoras = 0;

            db.sort((a,b) => b.id - a.id).forEach(i => {
                tNeto += i.neto; tBruto += i.bruto;
                tHoras += (i.h50 + i.h100);
                
                let tareasHtml = i.tareas ? `<p style="font-size:0.8rem; font-style:italic; color:var(--text); margin-top:4px;"><i class="fa-solid fa-clipboard-check" style="color:var(--primary); margin-right:4px;"></i>${i.tareas}</p>` : "";

                const li = document.createElement('li');
                li.className = `list-item ${i.acor ? 'pendiente-bg' : ''}`;
                li.innerHTML = `
                    <div style="flex:1;">
                        <p style="font-weight:bold; font-size:0.9rem;">${i.fecha} <small style="color:var(--muted); font-weight:normal;">(${i.txt})</small></p>
                        ${tareasHtml}
                        <p style="font-size:0.7rem; color:var(--muted); margin-top:4px;">
                            ${i.acor ? '<strong style="color:var(--danger)">PENDIENTE</strong>' : 'Sumado: '+fmt(i.neto)}
                        </p>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="startEdit(${i.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="btn-del" onclick="del(${i.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });

            document.getElementById('view-extra-neto').innerText = fmt(tNeto);
            document.getElementById('view-total-horas').innerText = tHoras.toFixed(1) + "h";
            document.getElementById('view-total-neto').innerText = fmt(VALORES.NETO_BASE + tNeto);
            document.getElementById('view-total-bruto').innerText = fmt(VALORES.BRUTO_BASE + tBruto);
        }

        function startEdit(id) {
            const item = db.find(x => x.id === id);
            editId = id;
            document.getElementById('in-fecha').value = item.fecha;
            document.getElementById('in-acordar').checked = item.acor;
            document.getElementById('in-tareas').value = item.tareas || "";
            if (!item.acor) {
                const horasArr = item.txt.split(' a ');
                document.getElementById('in-inicio').value = horasArr[0];
                document.getElementById('in-fin').value = horasArr[1];
            }
            toggleInputs();
            document.getElementById('form-title').innerText = "Editando Turno";
            document.getElementById('btn-main').innerText = "Actualizar";
            document.getElementById('btn-cancel').style.display = "block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function cancelEdit() {
            editId = null;
            document.getElementById('form-title').innerText = "Registrar Turno";
            document.getElementById('btn-main').innerText = "Guardar Registro";
            document.getElementById('btn-cancel').style.display = "none";
            document.getElementById('in-acordar').checked = false;
            document.getElementById('in-tareas').value = "";
            toggleInputs();
        }

        function del(id) {
            if(confirm("¿Eliminar?")) { db = db.filter(x => x.id !== id); localStorage.setItem('rutas_v5', JSON.stringify(db)); render(); }
        }

        function resetAll() {
            if(confirm("¿Borrar todo?")) { db = []; localStorage.clear(); render(); }
        }

        function fmt(v) { return new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS', maximumFractionDigits: 0}).format(v); }
    </script>
</body>
</html>
